name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install modules
        run: pnpm install
      - name: Create build
        run: pnpm build
      - name: Run lint
        run: pnpm lint
      - name: Run format check
        run: pnpm format --check
      - name: Run tests
        run: pnpm test
